<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Resmi - GoMART</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
<div class="app">

<div class="page active" id="pg-storelist">
  <div class="pg-header" style="justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="back-btn" onclick="window.location.href='index.html'"><i class="ti ti-arrow-left"></i></button>
      <h2>Toko Resmi GoMART</h2>
    </div>
    <span style="background:var(--yellow);color:var(--maroon-dark);font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px" id="storelist-count-badge">0 TOKO</span>
  </div>
  <div class="allprod-body">
    <div class="allprod-toolbar">
      <div class="allprod-search-row">
        <input type="text" id="storelist-search-input" placeholder="Cari nama toko..." oninput="renderStoreList()">
        <button onclick="renderStoreList()"><i class="ti ti-search"></i></button>
      </div>
    </div>
    <div class="storelist-grid" id="storelist-grid"></div>
  </div>
  <div class="bottom-nav">
    <button class="bnav-btn" onclick="window.location.href='index.html'"><i class="ti ti-home"></i><span>Beranda</span></button>
    <button class="bnav-btn" onclick="window.location.href='index.html?goto=promo'"><i class="ti ti-tag"></i><span>Promo</span></button>
    <button class="bnav-btn" onclick="goToCart()">
      <i class="ti ti-shopping-cart"></i>
      <span id="cart-dot8" class="bnav-dot" style="display:none">0</span>
      <span>Keranjang</span>
    </button>
    <button class="bnav-btn" onclick="goToTracking()"><i class="ti ti-truck-delivery"></i><span>Lacak</span></button>
    <button class="bnav-btn" onclick="goToAccount()"><i class="ti ti-user-circle"></i><span>Akun</span></button>
  </div>
</div>

</div>

<div class="toast" id="toast"><i class="ti ti-circle-check"></i><span id="toast-msg">Berhasil</span></div>
<script src="index.js"></script>
<script>renderStoreList();</script>
</body>
</html>
